<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Street-Giving Lambda Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="../outputs/analysis/web/data.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0c0f;
      --panel: rgba(18, 20, 24, .92);
      --ink: #ececed;
      --muted: #868a92;
      --line: rgba(255, 255, 255, .08);
      --accent: #d99a3c;
      --accent-soft: rgba(217, 154, 60, .12);
      --shadow: 0 8px 28px rgba(0, 0, 0, .38);
      --radius: 12px;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #map { position: absolute; inset: 0; }

    .panel, .details, .legend {
      position: absolute;
      z-index: 2;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel {
      top: 20px;
      left: 20px;
      width: 286px;
      padding: 20px;
      animation: rise .45s var(--ease) both;
    }
    .eyebrow {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 20px;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -.015em;
    }
    label {
      display: block;
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    input[type="range"] {
      width: 100%;
      margin-top: 2px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .02);
    }
    .segmented button {
      border: 0;
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--muted);
      background: transparent;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color .18s var(--ease), background .18s var(--ease), box-shadow .18s var(--ease);
    }
    .segmented button:hover { color: var(--ink); }
    .segmented button.active {
      color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px rgba(217, 154, 60, .26);
    }
    .stat {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }
    .chip {
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .02);
    }
    .chip b {
      display: block;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.01em;
      font-variant-numeric: tabular-nums;
    }
    .chip span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .details {
      top: 20px;
      right: 20px;
      width: 430px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      padding: 22px;
      opacity: 0;
      transform: translateX(20px) scale(.98);
      transform-origin: top right;
      pointer-events: none;
      transition: opacity .4s var(--ease), transform .4s var(--ease);
    }
    .details.visible {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }
    .details::-webkit-scrollbar { width: 6px; }
    .details::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, .14); border-radius: 999px; }
    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, .04);
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      transition: color .2s var(--ease), background .2s var(--ease), border-color .2s var(--ease), transform .25s var(--ease);
    }
    .close-btn:hover {
      color: var(--ink);
      background: rgba(255, 255, 255, .1);
      border-color: rgba(255, 255, 255, .2);
    }
    .details h2 {
      margin: 0 40px 4px 0;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -.015em;
    }
    .details p { margin: 0; color: var(--muted); font-size: 12px; }
    .formula {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, .03);
      font-size: 12px;
      line-height: 1.6;
    }
    .formula code {
      color: var(--accent);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11.5px;
    }
    .segment-table {
      width: 100%;
      margin-top: 16px;
      border-collapse: collapse;
      font-size: 11px;
    }
    .segment-table th {
      color: var(--muted);
      font-weight: 500;
      text-align: right;
      border-bottom: 1px solid var(--line);
      padding: 8px 4px;
    }
    .segment-table th:first-child,
    .segment-table td:first-child { text-align: left; }
    .segment-table td {
      text-align: right;
      padding: 8px 4px;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }
    .segment-table tbody tr { transition: background .15s var(--ease); }
    .segment-table tbody tr:hover { background: rgba(255, 255, 255, .03); }
    .rows { margin-top: 16px; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      color: var(--muted);
      font-size: 12px;
    }
    .row:last-child { border-bottom: 0; }
    .row b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }
    .legend {
      right: 20px;
      bottom: 20px;
      width: 260px;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .03em;
      animation: rise .5s var(--ease) both;
    }
    .legend-title { color: var(--ink); font-weight: 500; }
    .ramp {
      height: 8px;
      margin: 10px 0 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #0f172a, #155e75, #14b8a6, #facc15, #fb923c, #ef4444);
    }
    .legend-row { display: flex; justify-content: space-between; }
    .maplibregl-popup-content {
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      background: rgba(12,14,20,.92);
      color: #eef2f7;
      box-shadow: 0 18px 40px rgba(0,0,0,.4);
      backdrop-filter: blur(12px);
      font-family: "Inter", sans-serif;
    }
    .maplibregl-popup-tip { border-top-color: rgba(12,14,20,.92) !important; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <p class="eyebrow">Central London</p>
    <h1>Street-Giving Lambda</h1>
    <label>Day Type</label>
    <div class="segmented" id="day-toggle">
      <button class="active" data-day="weekday">Weekday</button>
      <button data-day="weekend">Weekend</button>
    </div>
    <label>Dimension</label>
    <div class="segmented" id="mode-toggle">
      <button class="active" data-mode="2d">2D</button>
      <button data-mode="3d">3D</button>
    </div>
    <label>Hour: <span id="hlabel">12</span></label>
    <input id="hour" type="range" min="0" max="23" value="12" />
    <div class="stat">
      <div class="chip"><b id="field-label">Weekday 12:00</b><span>Active Layer</span></div>
      <div class="chip"><b id="peak-label">0</b><span>95th Percentile</span></div>
    </div>
  </div>
  <div class="details" id="details">
    <button class="close-btn" id="details-close" aria-label="Close">&times;</button>
    <div id="details-body"></div>
  </div>
  <div class="legend">
    <div class="legend-title">Relative Lambda Intensity</div>
    <div class="ramp"></div>
    <div class="legend-row"><span>Lower</span><span>Higher</span></div>
  </div>
  <script>
    const state = { day: "weekday", mode: "2d", selected: null };
    const map = new maplibregl.Map({
      container: "map",
      center: [-0.105, 51.512],
      zoom: 10.55,
      pitch: 0,
      bearing: 0,
      antialias: true,
      style: {
        version: 8,
        sources: {
          base: {
            type: "raster",
            tiles: ["https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png", "https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png"],
            tileSize: 256,
            attribution: "&copy; OpenStreetMap &copy; CARTO"
          }
        },
        layers: [
          { id: "base", type: "raster", source: "base", paint: { "raster-opacity": 0.82 } }
        ]
      }
    });

    function field() {
      const hour = document.getElementById("hour").value;
      return `${state.day}_h${hour}`;
    }
    function grossField() {
      const hour = document.getElementById("hour").value;
      return `${state.day}_gross_h${hour}`;
    }
    function values(f) {
      return LAMBDA_DATA.features.map(x => +x.properties[f] || 0).filter(Number.isFinite);
    }
    function quantiles(f) {
      const vs = values(f).sort((a, b) => a - b);
      const q = p => vs[Math.min(vs.length - 1, Math.max(0, Math.floor(vs.length * p)))] || 0;
      return { lo: q(.03), q20: q(.20), q40: q(.40), q60: q(.60), q80: q(.80), hi: q(.97) };
    }
    function colorExpression(q) {
      return [
        "interpolate", ["linear"], ["to-number", ["get", field()], 0],
        q.lo, "#0f172a",
        q.q20, "#155e75",
        q.q40, "#14b8a6",
        q.q60, "#facc15",
        q.q80, "#fb923c",
        q.hi, "#ef4444"
      ];
    }
    function heightExpression(q) {
      if (state.mode === "2d") return 0;
      const f = field();
      const vs = values(f);
      const min = vs.length ? Math.min(...vs) : 0;
      const max = vs.length ? Math.max(...vs) : 1;
      const span = (max - min) || 1;
      const CEILING = 4200;
      const GAMMA = 0.55;
      const norm = ["max", 0, ["min", 1, ["/", ["-", ["to-number", ["get", f], 0], min], span]]];
      return ["*", ["^", norm, GAMMA], CEILING];
    }
    function fmt(v) {
      return Number.isFinite(v) ? Math.round(v).toLocaleString() : "0";
    }
    function setActive(groupId, attr, value) {
      document.querySelectorAll(`#${groupId} button`).forEach(btn => {
        btn.classList.toggle("active", btn.dataset[attr] === value);
      });
    }
    function label(value) {
      return String(value).replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }
    function detailHtml(p) {
      const f = field();
      const gf = grossField();
      const gross = +p[gf] || 0;
      const pressure = +p.competition_pressure || 0;
      const share = pressure / (1 + pressure);
      const competition = gross * share;
      const lambda = +p[f] || 0;
      const hour = document.getElementById("hour").value.padStart(2, "0");
      const segments = ["workers", "leisure", "shoppers", "tourists", "events", "students"];
      const segmentFoot = segments.map(s => +p[`${state.day}_${s}_foot_h${+document.getElementById("hour").value}`] || 0);
      const totalFoot = segmentFoot.reduce((a, b) => a + b, 0);
      const segmentRows = segments.map(s => {
        const foot = +p[`${state.day}_${s}_foot_h${+document.getElementById("hour").value}`] || 0;
        const prob = +p[`${s}_p`] || 0;
        const amount = +p[`${s}_amount`] || 0;
        const contrib = +p[`${state.day}_${s}_contrib_h${+document.getElementById("hour").value}`] || 0;
        const pct = totalFoot ? (foot / totalFoot) * 100 : 0;
        return `<tr><td>${label(s)}</td><td>${pct.toFixed(1)}%</td><td>${fmt(foot)}</td><td>${(prob * 100).toFixed(1)}%</td><td>${amount.toFixed(2)}</td><td>${fmt(contrib)}</td></tr>`;
      }).join("");
      return `
        <h2>${p.msoa_name}</h2>
        <p>${p.borough} · ${label(state.day)} ${hour}:00</p>
        <div class="formula">
          <div><code>λ(l,t) = gross(l,t) - c(l,t)</code></div>
          <div><code>gross = Σ_d a_d(l) × p_d × f_d(l,t)</code></div>
          <div><code>c = gross × pressure / (1 + pressure)</code></div>
          <div style="margin-top:8px;color:var(--muted)">Here, <code>a_d(l)</code> is a regional spend index, so it changes by area based on local income and nearby POI density.</div>
        </div>
        <div class="rows">
          <div class="row"><span>Gross Giving Pool</span><b>${fmt(gross)}</b></div>
          <div class="row"><span>Competition Pressure</span><b>${pressure.toFixed(2)}</b></div>
          <div class="row"><span>Competition Share</span><b>${(share * 100).toFixed(1)}%</b></div>
          <div class="row"><span>Competition Cost c(l,t)</span><b>${fmt(competition)}</b></div>
          <div class="row"><span>Final Lambda</span><b>${fmt(lambda)}</b></div>
        </div>
        <table class="segment-table">
          <thead><tr><th>Segment</th><th>Share</th><th>f_d</th><th>p_d</th><th>a_d</th><th>Value</th></tr></thead>
          <tbody>${segmentRows}</tbody>
        </table>
      `;
    }
    function refreshDetails() {
      const el = document.getElementById("details");
      const body = document.getElementById("details-body");
      if (!state.selected) {
        el.classList.remove("visible");
        return;
      }
      body.innerHTML = detailHtml(state.selected);
      el.classList.add("visible");
    }
    function update() {
      const f = field();
      const q = quantiles(f);
      const is3d = state.mode === "3d";
      document.getElementById("hlabel").textContent = document.getElementById("hour").value;
      document.getElementById("field-label").textContent = `${label(state.day)} ${String(document.getElementById("hour").value).padStart(2, "0")}:00`;
      document.getElementById("peak-label").textContent = Math.round(q.hi).toLocaleString();
      if (!map.getLayer("lambda-extrusion")) return;
      map.setPaintProperty("lambda-fill", "fill-color", colorExpression(q));
      map.setPaintProperty("lambda-fill", "fill-opacity", is3d ? 0 : 0.8);
      map.setPaintProperty("lambda-extrusion", "fill-extrusion-color", colorExpression(q));
      map.setPaintProperty("lambda-extrusion", "fill-extrusion-height", heightExpression(q));
      map.setPaintProperty("lambda-extrusion", "fill-extrusion-opacity", is3d ? 0.9 : 0);
      map.setPaintProperty("lambda-lines", "line-opacity", is3d ? 0 : 0.35);
      refreshDetails();
    }
    map.on("load", () => {
      map.addSource("lambda", { type: "geojson", data: LAMBDA_DATA });
      const q = quantiles(field());
      map.addLayer({
        id: "lambda-fill",
        type: "fill",
        source: "lambda",
        paint: {
          "fill-color": colorExpression(q),
          "fill-opacity": 0.50,
          "fill-outline-color": "rgba(0,0,0,0)",
          "fill-color-transition": { duration: 400 },
          "fill-opacity-transition": { duration: 400 }
        }
      });
      map.addLayer({
        id: "lambda-extrusion",
        type: "fill-extrusion",
        source: "lambda",
        paint: {
          "fill-extrusion-color": colorExpression(q),
          "fill-extrusion-height": heightExpression(q),
          "fill-extrusion-base": 0,
          "fill-extrusion-opacity": 0,
          "fill-extrusion-vertical-gradient": true,
          "fill-extrusion-color-transition": { duration: 400 },
          "fill-extrusion-height-transition": { duration: 700 },
          "fill-extrusion-opacity-transition": { duration: 500 }
        }
      });
      map.addLayer({
        id: "lambda-lines",
        type: "line",
        source: "lambda",
        paint: {
          "line-color": "rgba(8,10,15,.55)",
          "line-width": ["interpolate", ["linear"], ["zoom"], 9, 0.4, 12, 0.9],
          "line-opacity": 0.35,
          "line-opacity-transition": { duration: 400 }
        }
      });

      ["lambda-fill", "lambda-extrusion"].forEach(layerId => {
        map.on("mousemove", layerId, () => {
          map.getCanvas().style.cursor = "pointer";
        });
        map.on("mouseleave", layerId, () => {
          map.getCanvas().style.cursor = "";
        });
        map.on("click", layerId, e => {
          state.selected = e.features[0].properties;
          refreshDetails();
        });
      });
      update();
    });

    document.getElementById("day-toggle").addEventListener("click", e => {
      if (!e.target.dataset.day) return;
      state.day = e.target.dataset.day;
      setActive("day-toggle", "day", state.day);
      update();
    });
    document.getElementById("mode-toggle").addEventListener("click", e => {
      if (!e.target.dataset.mode) return;
      state.mode = e.target.dataset.mode;
      setActive("mode-toggle", "mode", state.mode);
      map.easeTo({
        pitch: state.mode === "2d" ? 0 : 52,
        bearing: state.mode === "2d" ? 0 : -17,
        zoom: state.mode === "2d" ? 10.55 : 11.1,
        duration: 900,
        easing: t => 1 - Math.pow(1 - t, 3)
      });
      update();
    });
    document.getElementById("hour").addEventListener("input", update);
    document.getElementById("details-close").addEventListener("click", () => {
      state.selected = null;
      refreshDetails();
    });
  </script>
</body>
</html>
